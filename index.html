<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="/Taralabalu-shishya-mandali/">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Taralabalu Shishya Mandali Platform.">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Taralabalu Shishya Mandali">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>Taralabalu Shishya Mandali</title>
  <link rel="manifest" href="manifest.json">

  <style>
    /* Premium custom scrollbar styling */
    ::-webkit-scrollbar {
      width: 10px;
      height: 10px;
    }
    ::-webkit-scrollbar-track {
      background: rgba(0, 0, 0, 0.05);
    }
    body.dark-theme ::-webkit-scrollbar-track {
      background: rgba(255, 255, 255, 0.05);
    }
    ::-webkit-scrollbar-thumb {
      background: linear-gradient(135deg, #4A148C, #00BCD4);
      border-radius: 5px;
    }
    ::-webkit-scrollbar-thumb:hover {
      background: linear-gradient(135deg, #6A1B9A, #00E5FF);
    }

    /* Ambient vignette overlay for login/splash screens to enhance the aesthetic */
    #login-vignette {
      position: fixed;
      left: 0;
      top: 0;
      width: 100vw;
      height: 100vh;
      pointer-events: none;
      z-index: 999998; /* Under watermark but above Flutter canvas */
      background: radial-gradient(circle, transparent 40%, rgba(26, 9, 51, 0.5) 80%, rgba(0, 0, 0, 0.8) 100%);
      box-shadow: inset 0 0 120px rgba(0, 188, 212, 0.15); /* Soft teal aura */
      display: block;
      transition: opacity 0.6s cubic-bezier(0.4, 0, 0.2, 1), visibility 0.6s;
    }
    body.logged-in #login-vignette {
      opacity: 0;
      visibility: hidden;
    }

    /* Fixed watermark overlay - centered and stretched to cover entire window on mobile */
    #watermark-overlay {
      position: fixed;
      left: 0;
      top: 0;
      width: 100vw;
      height: 100vh;
      background-image: url('assets/assets/app_icon.jpg');
      background-position: center;
      background-repeat: no-repeat;
      background-size: cover; /* Cover entire viewport height and width properly */
      opacity: 0.15; /* Less opacity as requested */
      pointer-events: none;
      z-index: 999999; /* Higher than Flutter view layer */
      display: none; /* Toggled dynamically on login status */
      transition: opacity 0.5s ease;
    }

    /* Invert watermark color in dark mode so it renders as light lines */
    body.dark-theme.logged-in #watermark-overlay {
      opacity: 0.10; /* Even less opacity on dark background */
      filter: invert(1);
    }

    /* Smooth transition for theme filter inversion and entry scaling */
    flt-glass-pane {
      transition: filter 0.8s cubic-bezier(0.4, 0, 0.2, 1);
      animation: appFadeIn 1.2s cubic-bezier(0.4, 0, 0.2, 1);
    }
    @keyframes appFadeIn {
      0% { opacity: 0; transform: scale(0.98); }
      100% { opacity: 1; transform: scale(1); }
    }

    /* Dark mode color inversion for the Flutter app when logged in */
    body.dark-theme.logged-in flt-glass-pane {
      filter: invert(1) hue-rotate(180deg) brightness(1.1) contrast(0.9);
    }

    /* Floating theme toggle button with pulsing glow and rotate animation */
    #theme-toggle-btn {
      position: fixed;
      bottom: 20px;
      right: 20px;
      width: 50px;
      height: 50px;
      border-radius: 50%;
      background: #4A148C;
      color: white;
      border: none;
      box-shadow: 0 4px 12px rgba(74, 20, 140, 0.4);
      cursor: pointer;
      z-index: 1000000; /* Always on top */
      display: none; /* Hidden by default, only shown when logged in */
      align-items: center;
      justify-content: center;
      font-size: 24px;
      transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      animation: themePulse 3s infinite alternate;
    }
    @keyframes themePulse {
      0% { box-shadow: 0 0 10px rgba(74, 20, 140, 0.4); }
      100% { box-shadow: 0 0 25px rgba(74, 20, 140, 0.8), 0 0 10px rgba(0, 188, 212, 0.4); }
    }
    #theme-toggle-btn:hover {
      transform: scale(1.1) rotate(15deg);
    }
    #theme-toggle-btn:active {
      transform: scale(0.95);
    }
    body.dark-theme #theme-toggle-btn {
      background: #ffffff;
      color: #1a0933;
      box-shadow: 0 4px 12px rgba(255, 255, 255, 0.4);
    }
    body.logged-in #theme-toggle-btn {
      display: flex;
    }

    /* Mutt-themed html loading screen to prevent initial white screen flash */
    #html-loader {
      position: fixed;
      inset: 0;
      background: radial-gradient(circle, #1a0933, #0d0221, #000000);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 9999999;
      opacity: 1;
      transition: opacity 0.5s ease, visibility 0.5s;
    }
    .spinner {
      width: 65px;
      height: 65px;
      border: 4px solid rgba(255, 111, 0, 0.15);
      border-top: 4px solid #FF6F00;
      border-left: 4px solid #00BCD4;
      border-radius: 50%;
      animation: spin 1s cubic-bezier(0.4, 0, 0.2, 1) infinite;
      box-shadow: 0 0 20px rgba(255, 111, 0, 0.3);
    }
    .loader-text {
      margin-top: 24px;
      color: white;
      font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      font-size: 16px;
      font-weight: 500;
      letter-spacing: 2px;
      text-transform: uppercase;
      animation: pulseText 1.5s infinite alternate;
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    @keyframes pulseText {
      0% { opacity: 0.5; }
      100% { opacity: 1; }
    }
  </style>
</head>
<body>
  <!-- Custom Loading Splash Screen -->
  <div id="html-loader">
    <div class="spinner"></div>
    <div class="loader-text">Taralabalu Shishya Mandali</div>
  </div>

  <!-- Ambient Login Vignette -->
  <div id="login-vignette"></div>

  <!-- Watermark Element -->
  <div id="watermark-overlay"></div>

  <!-- Floating Theme Toggle Button -->
  <button id="theme-toggle-btn" onclick="toggleTheme()" title="Switch Theme">🌙</button>

  <!-- Theme and Watermark Script -->
  <script>
    // Initialize theme mode immediately to prevent flash
    (function() {
      var savedTheme = localStorage.getItem('tsm_theme_mode') || 'light';
      if (savedTheme === 'dark') {
        document.body.classList.add('dark-theme');
      }
    })();

    function toggleTheme() {
      var body = document.body;
      var btn = document.getElementById('theme-toggle-btn');
      if (body.classList.contains('dark-theme')) {
        body.classList.remove('dark-theme');
        if (btn) btn.textContent = '🌙';
        localStorage.setItem('tsm_theme_mode', 'light');
      } else {
        body.classList.add('dark-theme');
        if (btn) btn.textContent = '☀️';
        localStorage.setItem('tsm_theme_mode', 'dark');
      }
    }

    // Update toggle button text on load if dark theme is active
    window.addEventListener('DOMContentLoaded', function() {
      var savedTheme = localStorage.getItem('tsm_theme_mode') || 'light';
      var btn = document.getElementById('theme-toggle-btn');
      if (btn) {
        btn.textContent = savedTheme === 'dark' ? '☀️' : '🌙';
      }
    });

    // Observer to fade out HTML loader when Flutter view renders
    var observer = new MutationObserver(function(mutations) {
      if (document.querySelector('flt-glass-pane') || document.querySelector('flutter-view')) {
        var loader = document.getElementById('html-loader');
        if (loader) {
          loader.style.opacity = '0';
          setTimeout(function() {
            loader.style.visibility = 'hidden';
            loader.remove();
          }, 500);
        }
        observer.disconnect();
      }
    });
    observer.observe(document.body, { childList: true, subtree: true });

    // Dynamic State Toggler
    setInterval(function() {
      try {
        var isLoggedIn = localStorage.getItem('flutter.is_logged_in') || localStorage.getItem('is_logged_in');
        var watermark = document.getElementById('watermark-overlay');
        var body = document.body;
        
        if (isLoggedIn === 'true' || isLoggedIn === true || isLoggedIn === '1' || isLoggedIn === 1) {
          body.classList.add('logged-in');
          if (watermark) watermark.style.display = 'block';
        } else {
          body.classList.remove('logged-in');
          if (watermark) watermark.style.display = 'none';
        }
      } catch (e) {
        console.error('Error checking login status:', e);
      }
    }, 500);
  </script>

  <script src="flutter_bootstrap.js?v=103" async></script>
</body>
</html>
