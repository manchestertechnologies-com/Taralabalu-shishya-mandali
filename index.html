  <script>
    // Programmatically clear service worker and cache storage to prevent caching issues
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.getRegistrations().then(function(registrations) {
        for (var i = 0; i < registrations.length; i++) {
          registrations[i].unregister();
          console.log('Service worker unregistered');
        }
      });
    }
    if ('caches' in window) {
      caches.keys().then(function(names) {
        for (var i = 0; i < names.length; i++) {
          caches.delete(names[i]);
          console.log('Cache storage cleared:', names[i]);
        }
      });
    }

    // ── LOCAL STORAGE CENSUS DATABASE EMULATION LAYER ───────
    function generateUUID() {
      return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, function(c) {
        var r = Math.random() * 16 | 0, v = c == 'x' ? r : (r & 0x3 | 0x8);
        return v.toString(16);
      });
    }

    // Initialize database arrays in localStorage if they don't exist
    if (!localStorage.getItem('census_households')) {
      localStorage.setItem('census_households', '[]');
    }
    if (!localStorage.getItem('census_members')) {
      localStorage.setItem('census_members', '[]');
    }
    if (!localStorage.getItem('census_sequential_id_counter')) {
      localStorage.setItem('census_sequential_id_counter', '0');
    }

    // Map for temporary Blob URLs to Base64 strings
    window.blobToBase64Map = window.blobToBase64Map || {};

    // Get User Sequential ID lookup helper
    window.getSequentialId = function(name, mobile) {
      var members = JSON.parse(localStorage.getItem('census_members') || '[]');
      var cleanName = String(name || "").trim().toLowerCase();
      var cleanMobile = String(mobile || "").trim();
      
      // Try lookup by name and mobile
      var found = members.find(function(m) {
        var mName = String(m.name || "").trim().toLowerCase();
        var mMobile = String(m.mobile_number || "").trim();
        return mName === cleanName && mMobile === cleanMobile;
      });
      if (found && found.sequential_id) return found.sequential_id.toString();
      
      // Fallback lookup by name only
      var foundByName = members.find(function(m) {
        var mName = String(m.name || "").trim().toLowerCase();
        return mName === cleanName;
      });
      if (foundByName && foundByName.sequential_id) return foundByName.sequential_id.toString();
      
      return "1";
    };

    // Intercept standard fetch requests to redirect Supabase queries to localStorage
    (function() {
      var originalFetch = window.fetch;
      window.fetch = async function(resource, init) {
        var url = typeof resource === 'string' ? resource : resource.url;
        
        if (url && url.indexOf('.supabase.co/rest/v1/') !== -1) {
          console.log('[Mock Supabase Fetch]:', url, init);
          try {
            var parsedUrl = new URL(url);
            var path = parsedUrl.pathname;
            var method = init ? (init.method || 'GET').toUpperCase() : 'GET';
            
            var parts = path.split('/');
            var table = parts[parts.length - 1];
            
            // 1. GET HOUSEHOLD MEMBERS (Admin list)
            if (table === 'household_members' && method === 'GET') {
              var members = JSON.parse(localStorage.getItem('census_members') || '[]');
              var households = JSON.parse(localStorage.getItem('census_households') || '[]');
              
              var joinedData = members.map(function(m) {
                var hh = households.find(function(h) { return h.id === m.household_id; }) || {};
                return Object.assign({}, m, {
                  household_created_at: hh.created_at || new Date().toISOString(),
                  household_user_id: hh.user_id || 'anonymous'
                });
              });
              
              // Sort by sequential ID descending so newest users appear first
              joinedData.sort(function(a, b) {
                return (b.sequential_id || 0) - (a.sequential_id || 0);
              });
              
              return new Response(JSON.stringify(joinedData), {
                status: 200,
                headers: {
                  'Content-Type': 'application/json',
                  'content-range': '0-' + (joinedData.length - 1) + '/' + joinedData.length
                }
              });
            }
            
            // 2. POST HOUSEHOLDS (Add new household)
            if (table === 'households' && method === 'POST') {
              var body = JSON.parse(init.body || '{}');
              var households = JSON.parse(localStorage.getItem('census_households') || '[]');
              
              var newId = generateUUID();
              var newHousehold = {
                id: newId,
                user_id: body.user_id || 'anonymous',
                created_at: new Date().toISOString(),
                updated_at: new Date().toISOString()
              };
              
              households.push(newHousehold);
              localStorage.setItem('census_households', JSON.stringify(households));
              
              // Clear autosave draft on successful submission
              localStorage.removeItem('census_autosave_form');
              
              return new Response(JSON.stringify(newHousehold), {
                status: 201,
                headers: { 'Content-Type': 'application/json' }
              });
            }
            
            // 3. POST PERSONS (Add household member)
            if (table === 'persons' && method === 'POST') {
              var body = JSON.parse(init.body || '{}');
              var members = JSON.parse(localStorage.getItem('census_members') || '[]');
              
              var householdId = body.household_id;
              
              // Fetch or create sequential ID for this household
              var seqId = localStorage.getItem('household_seq_' + householdId);
              if (!seqId) {
                var counter = parseInt(localStorage.getItem('census_sequential_id_counter') || '0') + 1;
                localStorage.setItem('census_sequential_id_counter', counter.toString());
                localStorage.setItem('household_seq_' + householdId, counter.toString());
                seqId = counter.toString();
              }
              
              var newId = generateUUID();
              var newMember = Object.assign({}, body, {
                id: newId,
                sequential_id: parseInt(seqId),
                created_at: new Date().toISOString(),
                updated_at: new Date().toISOString()
              });
              
              members.push(newMember);
              localStorage.setItem('census_members', JSON.stringify(members));
              
              return new Response(JSON.stringify(newMember), {
                status: 201,
                headers: { 'Content-Type': 'application/json' }
              });
            }
            
            // Fallback response
            return new Response(JSON.stringify([]), {
              status: 200,
              headers: { 'Content-Type': 'application/json' }
            });
          } catch(err) {
            console.error('[Mock Supabase Fetch Error]:', err);
            return new Response(JSON.stringify({ error: err.message }), {
              status: 500,
              headers: { 'Content-Type': 'application/json' }
            });
          }
        }
        
        return originalFetch.apply(this, arguments);
      };
    })();
  </script>

  <script>


    // ── INTERACTIVE CANVAS PARTICLES ──────────────────────
    var canvas = document.getElementById('login-particles');
    var ctx = canvas.getContext('2d');
    var particles = [];
    var maxParticles = 40;
    var animateParticles = true;

    function resizeCanvas() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resizeCanvas);
    resizeCanvas();

    // Mouse coordinates inside particle network
    var pMouse = { x: null, y: null, radius: 150 };
    window.addEventListener('mousemove', function(e) {
      pMouse.x = e.clientX;
      pMouse.y = e.clientY;
    });
    window.addEventListener('mouseout', function() {
      pMouse.x = null;
      pMouse.y = null;
    });

    class Particle {
      constructor() {
        this.x = Math.random() * canvas.width;
        this.y = Math.random() * canvas.height;
        this.vx = (Math.random() - 0.5) * 0.8;
        this.vy = (Math.random() - 0.5) * 0.8;
        this.radius = Math.random() * 2.5 + 1;
        this.color = Math.random() > 0.5 ? 'rgba(0, 180, 216, 0.45)' : 'rgba(255, 159, 0, 0.45)';
      }
      update() {
        // Move
        this.x += this.vx;
        this.y += this.vy;

        // Bounce on edges
        if (this.x < 0 || this.x > canvas.width) this.vx *= -1;
        if (this.y < 0 || this.y > canvas.height) this.vy *= -1;

        // Mouse attraction
        if (pMouse.x !== null && pMouse.y !== null) {
          let dx = pMouse.x - this.x;
          let dy = pMouse.y - this.y;
          let dist = Math.sqrt(dx*dx + dy*dy);
          if (dist < pMouse.radius) {
            let force = (pMouse.radius - dist) / pMouse.radius;
            this.x += (dx / dist) * force * 1.5;
            this.y += (dy / dist) * force * 1.5;
          }
        }
      }
      draw() {
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
        ctx.fillStyle = this.color;
        ctx.fill();
      }
    }

    // Init particles
    for (let i = 0; i < maxParticles; i++) {
      particles.push(new Particle());
    }

    function drawParticles() {
      if (!animateParticles) return;
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      
      // Update & Draw
      particles.forEach(p => {
        p.update();
        p.draw();
      });

      // Draw lines
      for (let i = 0; i < particles.length; i++) {
        for (let j = i + 1; j < particles.length; j++) {
          let dx = particles[i].x - particles[j].x;
          let dy = particles[i].y - particles[j].y;
          let dist = Math.sqrt(dx*dx + dy*dy);
          if (dist < 120) {
            ctx.beginPath();
            ctx.moveTo(particles[i].x, particles[i].y);
            ctx.lineTo(particles[j].x, particles[j].y);
            let alpha = (120 - dist) / 120 * 0.15;
            ctx.strokeStyle = `rgba(255, 255, 255, ${alpha})`;
            ctx.lineWidth = 0.8;
            ctx.stroke();
          }
        }
      }
      requestAnimationFrame(drawParticles);
    }
    requestAnimationFrame(drawParticles);


    // ── OBSERVERS & GENERAL STATE TOGGLER ─────────────────
    // Observer to fade out HTML loader when Flutter view renders
    var observer = new MutationObserver(function(mutations) {
      if (document.querySelector('flt-glass-pane') || document.querySelector('flutter-view')) {
        var loader = document.getElementById('html-loader');
        if (loader) {
          loader.style.opacity = '0';
          setTimeout(function() {
            loader.style.visibility = 'hidden';
            loader.remove();
          }, 500);
        }
        observer.disconnect();
      }
    });
    observer.observe(document.body, { childList: true, subtree: true });

    // Dynamic State Toggler (Watermark and Particles Control)
    setInterval(function() {
      try {
        var isLoggedIn = localStorage.getItem('flutter.is_logged_in') || localStorage.getItem('is_logged_in');
        var watermark = document.getElementById('watermark-overlay');
        var body = document.body;
        
        if (isLoggedIn === 'true' || isLoggedIn === true || isLoggedIn === '1' || isLoggedIn === 1) {
          body.classList.add('logged-in');
          if (watermark) watermark.style.display = 'block';
          animateParticles = false; // Stop particles loop when logged in to save performance
        } else {
          body.classList.remove('logged-in');
          if (watermark) watermark.style.display = 'none';
          if (!animateParticles) {
            animateParticles = true;
            requestAnimationFrame(drawParticles);
          }
        }
      } catch (e) {
        console.error('Error checking login status:', e);
      }
    }, 500);


    // ── PHOTO URL INTERCEPTOR & CAS-DROP SYSTEM ──────────────────
    // Override createObjectURL to capture user photo uploads
    window.blobToBase64Map = window.blobToBase64Map || {};
    
    // Global sequential ID generator for cards (stable IDs based on Name & Mobile)
    window.personIdMap = {};
    window.personIdCounter = 0;
    window.getSequentialId = function(name, phone) {
      var key = (name || "").trim().toLowerCase() + "_" + (phone || "").trim();
      if (!key || key === "_") return "1";
      if (!window.personIdMap[key]) {
        window.personIdCounter++;
        window.personIdMap[key] = window.personIdCounter;
      }
      return window.personIdMap[key].toString();
    };

    window.blobToBase64Promises = window.blobToBase64Promises || {};
    const originalCreateObjectURL = URL.createObjectURL;
    URL.createObjectURL = function (obj) {
      const url = originalCreateObjectURL(obj);
      if (obj instanceof Blob && obj.type && obj.type.startsWith('image/')) {
        window.latestPhotoUrl = url;
        console.log("Captured profile photo url:", url);
        if (window.onPhotoCaptured) {
          window.onPhotoCaptured(url);
        }
        
        // Convert to Base64 and store in the map via a Promise
        window.blobToBase64Promises[url] = new Promise(function(resolve) {
          var reader = new FileReader();
          reader.onload = function(evt) {
            window.blobToBase64Map[url] = evt.target.result;
            console.log("Mapped blob URL to Base64 data URI");
            if (window.activeFormScreenState) {
              try {
                var headData = window.serializePersonData(window.activeFormScreenState.e);
                window.updatePreviewCard(headData);
              } catch(ex) {}
            }
            resolve(evt.target.result);
          };
          reader.onerror = function() {
            resolve(url);
          };
          reader.readAsDataURL(obj);
        });
      }
      return url;
    };

    // Global listener for file inputs to capture image upload as Base64 data URI
    document.addEventListener('change', function(e) {
      var target = e.target;
      if (target && target.tagName === 'INPUT' && target.type === 'file') {
        var file = target.files[0];
        if (file && file.type.startsWith('image/')) {
          var reader = new FileReader();
          reader.onload = function(evt) {
            window.latestPhotoUrl = evt.target.result;
            console.log("Captured base64 profile photo:", window.latestPhotoUrl);
            if (window.activeFormScreenState) {
              try {
                var headData = window.serializePersonData(window.activeFormScreenState.e);
                window.updatePreviewCard(headData);
              } catch(ex) {}
            }
          };
          reader.readAsDataURL(file);
        }
      }
    }, true);

    window.getStatesForCountry = function(country) {

      var usaStates = ["Alabama","Alaska","Arizona","California","Florida","New York","Texas"];
      var ukStates = ["England","Scotland","Wales"];
      var australiaStates = ["New South Wales","Queensland","Victoria"];
      var canadaStates = ["Ontario"];
      var chinaStates = ["Guangdong","Beijing","Shanghai"];
      var brazilStates = ["Sao Paulo"];
      var argentinaStates = ["Buenos Aires"];
      var japanStates = ["Tokyo"];
      
      var c = String(country || "").trim().toLowerCase();
      if (c === "india") return indiaStates;
      if (c === "usa" || c === "united states" || c === "united states of america") return usaStates;
      if (c === "uk" || c === "united kingdom" || c === "england") return ukStates;
      if (c === "australia") return australiaStates;
      if (c === "canada") return canadaStates;
      if (c === "china") return chinaStates;
      if (c === "brazil") return brazilStates;
      if (c === "argentina") return argentinaStates;
      if (c === "japan") return japanStates;
      return [];
    };


    // The floating HTML preview card has been removed to prevent overlapping form fields.
    window.updatePreviewCard = function(data) {};


    // ── AUTO-SAVE SURVEY FORM SYSTEM ──────────────────────
    window.needsRestoreForm = localStorage.getItem('census_autosave_form') !== null;
    window.lastSavedJSON = '';
    window.activeFormScreenState = null;

    window.serializePersonData = function(p) {
      if (!p) return null;
      var dobStr = null;
      if (p.d) {
        try {
          dobStr = p.d.Eu(); // Eu() is toIso8601String() in Dart
        } catch(e) {
          console.error("Error serializing Date:", e);
        }
      }
      var photoVal = p.a || null;
      if (photoVal && window.blobToBase64Map && window.blobToBase64Map[photoVal]) {
        photoVal = window.blobToBase64Map[photoVal];
      }
      return {
        photo: photoVal,
        name: p.b || "",
        relationship: p.c || "",
        dob: dobStr,
        age: p.e || "",
        aadhar: p.f || "",
        mobile: p.r || "",
        maritalStatus: p.w || "",
        education: p.x || "",
        empType: p.y || "",
        occupation: p.z || "",
        traditionalOccupation: p.Q || "",
        country: p.as || "India",
        state: p.at || null,
        district: p.ax || null,
        taluk: p.ay || null,
        nagara: p.ch || null,
        ward: p.CW || null,
        pincode: p.cx || "",
        isExpanded: p.cy || false
      };
    };

    window.deserializePersonData = function(data, instance) {
      if (!data || !instance) return;
      instance.a = data.photo || null;
      instance.b = data.name || "";
      instance.c = data.relationship || "";
      if (data.dob) {
        var timestamp = Date.parse(data.dob);
        if (!isNaN(timestamp)) {
          if (typeof A !== 'undefined' && A.bZ && A.np) {
            instance.d = new A.bZ(A.np(timestamp, 0, false), 0, false);
          } else {
            console.warn("A.bZ or A.np is not defined, cannot restore DOB DateTime object");
          }
        }
      } else {
        instance.d = null;
      }
      instance.e = data.age || "";
      instance.f = data.aadhar || "";
      instance.r = data.mobile || "";
      instance.w = data.maritalStatus || "";
      instance.x = data.education || "";
      instance.y = data.empType || "";
      instance.z = data.occupation || "";
      instance.Q = data.traditionalOccupation || "";
      instance.as = data.country || "India";
      instance.at = data.state || null;
      instance.ax = data.district || null;
      instance.ay = data.taluk || null;
      instance.ch = data.nagara || null;
      instance.CW = data.ward || null;
      instance.cx = data.pincode || "";
      instance.cy = data.isExpanded || false;
    };

    window.onFormScreenBuild = function(state) {
      window.activeFormScreenState = state;
      if (window.needsRestoreForm) {
