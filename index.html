<!DOCTYPE html>
<html>
<head>
  <!--

    This is a placeholder for base href that will be replaced by the value of

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Taralabalu Shishya Mandali Platform.">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Taralabalu Shishya Mandali">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>Taralabalu Shishya Mandali</title>
  <link rel="manifest" href="manifest.json">

  <style>
    /* Premium custom scrollbar styling */
    ::-webkit-scrollbar {
      width: 10px;
      height: 10px;
    }
    ::-webkit-scrollbar-track {
      background: rgba(0, 0, 0, 0.05);
    }
    ::-webkit-scrollbar-thumb {
      background: linear-gradient(135deg, #00b4d8, #ff9f00);
      border-radius: 5px;
    }
    ::-webkit-scrollbar-thumb:hover {
      background: linear-gradient(135deg, #00e5ff, #ffb700);
    }

    /* Ambient vignette overlay for login/splash screens with premium colors */
    #login-vignette {
      position: fixed;
      left: 0;
      top: 0;
      width: 100vw;
      height: 100vh;
      pointer-events: none;
      z-index: 999998; /* Under watermark but above Flutter canvas */
      background: radial-gradient(circle, transparent 30%, rgba(42, 8, 92, 0.4) 75%, rgba(0, 0, 0, 0.85) 100%);
      box-shadow: inset 0 0 150px rgba(0, 180, 216, 0.2); /* Glowing cyan aura */
      display: block;
      transition: opacity 0.6s cubic-bezier(0.4, 0, 0.2, 1), visibility 0.6s;
    }
    body.logged-in #login-vignette {
      opacity: 0;
      visibility: hidden;
    }

    /* Interactive particle canvas backdrop on login */
    #login-particles {
      position: fixed;
      left: 0;
      top: 0;
      width: 100vw;
      height: 100vh;
      pointer-events: none;
      z-index: 999997; /* Behind vignette and watermark, above canvas */
      display: block;
      transition: opacity 0.6s cubic-bezier(0.4, 0, 0.2, 1), visibility 0.6s;
    }
    body.logged-in #login-particles {
      opacity: 0;
      visibility: hidden;
    }

    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow-x: hidden;
    }

    /* Fixed watermark overlay - centered and stretched to cover entire window on mobile */
    #watermark-overlay {
      position: fixed;
      left: 0;
      top: 0;
      right: 0;
      bottom: 0;
      width: 100%;
      height: 100%;
      background-image: url('assets/assets/app_icon.jpg');
      background-position: center center !important;
      background-repeat: no-repeat;
      background-size: cover; /* Cover entire viewport height and width properly */
      opacity: 0.15; /* Less opacity as requested */
      pointer-events: none;
      z-index: 999999; /* Higher than Flutter view layer */
      display: none; /* Toggled dynamically on login status */
      transition: opacity 0.5s ease;
    }

    /* Unified permanent "WOW" theme color shift for the entire Flutter view layer */
    flt-glass-pane {
      animation: appFadeIn 1.2s cubic-bezier(0.4, 0, 0.2, 1);
    }
    @keyframes appFadeIn {
      0% { opacity: 0; transform: scale(0.98); }
      100% { opacity: 1; transform: scale(1); }
    }



    /* Mutt-themed html loading screen to prevent initial white screen flash */
    #html-loader {
      position: fixed;
      inset: 0;
      background: radial-gradient(circle, #1a0933, #0d0221, #000000);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 9999999;
      opacity: 1;
      transition: opacity 0.5s ease, visibility 0.5s;
    }
    .spinner {
      width: 65px;
      height: 65px;
      border: 4px solid rgba(255, 111, 0, 0.15);
      border-top: 4px solid #FF6F00;
      border-left: 4px solid #00BCD4;
      border-radius: 50%;
      animation: spin 1s cubic-bezier(0.4, 0, 0.2, 1) infinite;
      box-shadow: 0 0 20px rgba(255, 111, 0, 0.3);
    }
    .loader-text {
      margin-top: 24px;
      color: white;
      font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      font-size: 16px;
      font-weight: 500;
      letter-spacing: 2px;
      text-transform: uppercase;
      animation: pulseText 1.5s infinite alternate;
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    @keyframes pulseText {
      0% { opacity: 0.5; }
      100% { opacity: 1; }
    }
  </style>
</head>
<body>
  <!-- Custom Loading Splash Screen -->
  <div id="html-loader">
    <div class="spinner"></div>
    <div class="loader-text">Taralabalu Shishya Mandali</div>
  </div>

  <!-- Ambient Login Vignette and Particles -->
  <div id="login-vignette"></div>
  <canvas id="login-particles"></canvas>

  <!-- Watermark Element -->
  <div id="watermark-overlay"></div>



  <!-- Theme and Watermark Script -->
  <script>


    // ── INTERACTIVE CANVAS PARTICLES ──────────────────────
    var canvas = document.getElementById('login-particles');
    var ctx = canvas.getContext('2d');
    var particles = [];
    var maxParticles = 40;
    var animateParticles = true;

    function resizeCanvas() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resizeCanvas);
    resizeCanvas();

    // Mouse coordinates inside particle network
    var pMouse = { x: null, y: null, radius: 150 };
    window.addEventListener('mousemove', function(e) {
      pMouse.x = e.clientX;
      pMouse.y = e.clientY;
    });
    window.addEventListener('mouseout', function() {
      pMouse.x = null;
      pMouse.y = null;
    });

    class Particle {
      constructor() {
        this.x = Math.random() * canvas.width;
        this.y = Math.random() * canvas.height;
        this.vx = (Math.random() - 0.5) * 0.8;
        this.vy = (Math.random() - 0.5) * 0.8;
        this.radius = Math.random() * 2.5 + 1;
        this.color = Math.random() > 0.5 ? 'rgba(0, 180, 216, 0.45)' : 'rgba(255, 159, 0, 0.45)';
      }
      update() {
        // Move
        this.x += this.vx;
        this.y += this.vy;

        // Bounce on edges
        if (this.x < 0 || this.x > canvas.width) this.vx *= -1;
        if (this.y < 0 || this.y > canvas.height) this.vy *= -1;

        // Mouse attraction
        if (pMouse.x !== null && pMouse.y !== null) {
          let dx = pMouse.x - this.x;
          let dy = pMouse.y - this.y;
          let dist = Math.sqrt(dx*dx + dy*dy);
          if (dist < pMouse.radius) {
            let force = (pMouse.radius - dist) / pMouse.radius;
            this.x += (dx / dist) * force * 1.5;
            this.y += (dy / dist) * force * 1.5;
          }
        }
      }
      draw() {
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
        ctx.fillStyle = this.color;
        ctx.fill();
      }
    }

    // Init particles
    for (let i = 0; i < maxParticles; i++) {
      particles.push(new Particle());
    }

    function drawParticles() {
      if (!animateParticles) return;
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      
      // Update & Draw
      particles.forEach(p => {
        p.update();
        p.draw();
      });

      // Draw lines
      for (let i = 0; i < particles.length; i++) {
        for (let j = i + 1; j < particles.length; j++) {
          let dx = particles[i].x - particles[j].x;
          let dy = particles[i].y - particles[j].y;
          let dist = Math.sqrt(dx*dx + dy*dy);
          if (dist < 120) {
            ctx.beginPath();
            ctx.moveTo(particles[i].x, particles[i].y);
            ctx.lineTo(particles[j].x, particles[j].y);
            let alpha = (120 - dist) / 120 * 0.15;
            ctx.strokeStyle = `rgba(255, 255, 255, ${alpha})`;
            ctx.lineWidth = 0.8;
            ctx.stroke();
          }
        }
      }
      requestAnimationFrame(drawParticles);
    }
    requestAnimationFrame(drawParticles);


    // ── OBSERVERS & GENERAL STATE TOGGLER ─────────────────
    // Observer to fade out HTML loader when Flutter view renders
    var observer = new MutationObserver(function(mutations) {
      if (document.querySelector('flt-glass-pane') || document.querySelector('flutter-view')) {
        var loader = document.getElementById('html-loader');
        if (loader) {
          loader.style.opacity = '0';
          setTimeout(function() {
            loader.style.visibility = 'hidden';
            loader.remove();
          }, 500);
        }
        observer.disconnect();
      }
    });
    observer.observe(document.body, { childList: true, subtree: true });

    // Dynamic State Toggler (Watermark and Particles Control)
    setInterval(function() {
      try {
        var isLoggedIn = localStorage.getItem('flutter.is_logged_in') || localStorage.getItem('is_logged_in');
        var watermark = document.getElementById('watermark-overlay');
        var body = document.body;
        
        if (isLoggedIn === 'true' || isLoggedIn === true || isLoggedIn === '1' || isLoggedIn === 1) {
          body.classList.add('logged-in');
          if (watermark) watermark.style.display = 'block';
          animateParticles = false; // Stop particles loop when logged in to save performance
        } else {
          body.classList.remove('logged-in');
          if (watermark) watermark.style.display = 'none';
          if (!animateParticles) {
            animateParticles = true;
            requestAnimationFrame(drawParticles);
          }
        }
      } catch (e) {
        console.error('Error checking login status:', e);
      }
    }, 500);

    // ── AUTO-SAVE SURVEY FORM SYSTEM ──────────────────────
    window.needsRestoreForm = localStorage.getItem('census_autosave_form') !== null;
    window.lastSavedJSON = '';
    window.activeFormScreenState = null;

    window.serializePersonData = function(p) {
      if (!p) return null;
      var dobStr = null;
      if (p.d) {
        try {
          dobStr = p.d.Eu(); // Eu() is toIso8601String() in Dart
        } catch(e) {
          console.error("Error serializing Date:", e);
        }
      }
      return {
        name: p.b || "",
        relationship: p.c || "",
        dob: dobStr,
        age: p.r || "",
        aadhar: p.f || "",
        mobile: p.e || "",
        maritalStatus: p.w || "",
        education: p.x || "",
        empType: p.y || "",
        occupation: p.z || "",
        traditionalOccupation: p.Q || "",
        country: p.as || "India",
        state: p.at || null,
        district: p.ax || null,
        taluk: p.ay || null,
        nagara: p.ch || null,
        ward: p.CW || null,
        pincode: p.cx || "",
        isExpanded: p.cy || false
      };
    };

    window.deserializePersonData = function(data, instance) {
      if (!data || !instance) return;
      instance.b = data.name || "";
      instance.c = data.relationship || "";
      if (data.dob) {
        var timestamp = Date.parse(data.dob);
        if (!isNaN(timestamp)) {
          if (typeof A !== 'undefined' && A.bZ && A.np) {
            instance.d = new A.bZ(A.np(timestamp, 0, false), 0, false);
          } else {
            console.warn("A.bZ or A.np is not defined, cannot restore DOB DateTime object");
          }
        }
      } else {
        instance.d = null;
      }
      instance.r = data.age || "";
      instance.f = data.aadhar || "";
      instance.e = data.mobile || "";
      instance.w = data.maritalStatus || "";
      instance.x = data.education || "";
      instance.y = data.empType || "";
      instance.z = data.occupation || "";
      instance.Q = data.traditionalOccupation || "";
      instance.as = data.country || "India";
      instance.at = data.state || null;
      instance.ax = data.district || null;
      instance.ay = data.taluk || null;
      instance.ch = data.nagara || null;
      instance.CW = data.ward || null;
      instance.cx = data.pincode || "";
      instance.cy = data.isExpanded || false;
    };

    window.onFormScreenBuild = function(state) {
      window.activeFormScreenState = state;
      if (window.needsRestoreForm) {
        window.needsRestoreForm = false;
        try {
          var saved = JSON.parse(localStorage.getItem('census_autosave_form'));
          if (saved) {
            var N = saved.members ? saved.members.length : 0;
            // If the member count doesn't match, trigger the setState change
            if (state.f.length !== N) {
              console.log("Auto-Save: Restoring member count to", N);
              if (typeof A !== 'undefined' && A.auU) {
                state.X(new A.auU(state, N));
              }
              return;
            }

            // Restore headOfHousehold data
            if (saved.head && state.e) {
              window.deserializePersonData(saved.head, state.e);
            }
            // Restore familyMembers data
            if (saved.members && state.f) {
              for (var i = 0; i < state.f.length; i++) {
                if (saved.members[i] && state.f[i]) {
                  window.deserializePersonData(saved.members[i], state.f[i]);
                }
              }
            }
            console.log("Auto-Save: Form data restored successfully!");
          }
        } catch (e) {
          console.error("Auto-Save: Restore failed:", e);
        }
      }
    };

    // Auto-Save Loop
    setInterval(function() {
      if (window.activeFormScreenState) {
        try {
          var state = window.activeFormScreenState;
          if (state.c === null) {
            window.activeFormScreenState = null;
            return;
          }
          var headData = window.serializePersonData(state.e);
          var membersData = [];
          if (state.f) {
            for (var i = 0; i < state.f.length; i++) {
              membersData.push(window.serializePersonData(state.f[i]));
            }
          }
          var payload = {
            head: headData,
            members: membersData
          };
          var json = JSON.stringify(payload);
          if (json !== window.lastSavedJSON) {
            localStorage.setItem('census_autosave_form', json);
            window.lastSavedJSON = json;
            console.log("Auto-Save: Form data saved!");
          }
        } catch (e) {
          // Ignore
        }
      }
    }, 1000);
  </script>

  <script src="flutter_bootstrap.js?v=105" async></script>
</body>
</html>
