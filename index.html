<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="/Taralabalu-shishya-mandali/">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Taralabalu Shishya Mandali Platform.">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Taralabalu Shishya Mandali">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>Taralabalu Shishya Mandali</title>
  <link rel="manifest" href="manifest.json">

  <style>
    /* Fixed watermark overlay on top of everything but non-interactive */
    #watermark-overlay {
      position: fixed;
      left: 0;
      top: 0;
      width: 100vw;
      height: 100vh;
      background-image: url('assets/assets/app_icon.jpg');
      background-position: center;
      background-repeat: no-repeat;
      background-size: contain;
      opacity: 0.18; /* Increased opacity for clear visibility as requested */
      pointer-events: none;
      z-index: 999999; /* Higher than Flutter CanvasKit view layer */
      display: none; /* Toggled dynamically on login status */
    }
  </style>
</head>
<body>
  <!-- Watermark Element -->
  <div id="watermark-overlay"></div>

  <!-- Dynamic Watermark Toggler Script -->
  <script>
    setInterval(function() {
      try {
        var isLoggedIn = localStorage.getItem('flutter.is_logged_in') || localStorage.getItem('is_logged_in');
        var watermark = document.getElementById('watermark-overlay');
        if (watermark) {
          if (isLoggedIn === 'true' || isLoggedIn === true || isLoggedIn === '1' || isLoggedIn === 1) {
            watermark.style.display = 'block';
          } else {
            watermark.style.display = 'none';
          }
        }
      } catch (e) {
        console.error('Error checking login status:', e);
      }
    }, 500);
  </script>

  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
